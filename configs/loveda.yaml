dataset:
  name: LoveDA
  root: data/LoveDA
  num_classes: 7
  classes: [background, building, road, water, barren, forest, agricultural]
  ignore_index: 255

model:
  clip: ViT-L/14
  sam_checkpoint: checkpoints/sam_vit_h.pth

geoprompt:
  strategy: ensemble
  patch_size: 32
  stride: 16

evaluation:
  max_images: null
  output_dir: results/loveda
